<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WashX - Staff Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0b0f; color: #ffffff; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: #1a1d24; padding: 20px; border-right: 1px solid #2d3139; }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-icon { width: 32px; height: 32px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: white; }
        .logo-text { font-size: 18px; font-weight: 600; }
        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 8px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #9ca3af; text-decoration: none; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover { background: #2d3139; color: #ffffff; }
        .nav-link.active { background: #374151; color: #ffffff; }
        .nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .main-content { margin-left: 240px; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 32px; font-weight: 700; }
        .page-subtitle { font-size: 16px; color: #9ca3af; margin-top: 4px; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .add-button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .add-button:hover { background: #2563eb; }
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; margin-top: 24px; }
        .staff-card { background: #1f2937; border: 1px solid #374151; border-radius: 16px; padding: 24px; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .staff-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); border-color: #4b5563; }
        .staff-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .staff-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .staff-info { display: flex; align-items: center; gap: 16px; }
        .staff-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: white; background: #3b82f6; }
        .staff-details h3 { font-size: 18px; font-weight: 600; color: #ffffff; margin-bottom: 4px; }
        .staff-id { font-size: 14px; color: #6b7280; }
        .staff-actions { display: flex; gap: 8px; }
        .action-btn { width: 32px; height: 32px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .edit-btn { background: #374151; color: #9ca3af; }
        .edit-btn:hover { background: #4b5563; color: #ffffff; }
        .delete-btn { background: #374151; color: #9ca3af; }
        .delete-btn:hover { background: #dc2626; color: #ffffff; }
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .contact-info { margin-bottom: 16px; }
        .contact-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 14px; color: #9ca3af; }
        .contact-icon { width: 16px; height: 16px; color: #6b7280; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); }
        .modal-content { background: #1f2937; margin: 5% auto; padding: 32px; border-radius: 16px; width: 90%; max-width: 500px; border: 1px solid #374151; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 24px; font-weight: 600; }
        .close-button { background: none; border: none; font-size: 24px; color: #9ca3af; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
        .close-button:hover { background: #374151; color: #ffffff; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-input, .form-select { width: 100%; padding: 12px; background: #374151; border: 1px solid #4b5563; border-radius: 8px; color: #ffffff; font-size: 14px; }
        .form-select[multiple] { height: 120px; }
        .form-input:focus, .form-select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .btn-secondary { background: #374151; color: #ffffff; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary, .btn-primary { border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-secondary:hover { background: #4b5563; }
        .btn-primary:hover { background: #2563eb; }
        .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; grid-column: 1 / -1; }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .loading { display: flex; justify-content: center; align-items: center; padding: 60px; color: #6b7280; }
        .spinner { width: 32px; height: 32px; border: 3px solid #374151; border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon">WX</div>
            <div class="logo-text">WashX<br><span style="font-size: 12px; color: #6b7280;">Admin Portal</span></div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/home.html" class="nav-link">📊 Dashboard</a></li>
            <li class="nav-item"><a href="/staff.html" class="nav-link active">👨‍💼 Staff</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header">
            <div>
                <h1 class="page-title">Staff</h1>
                <p class="page-subtitle">Manage all operational staff members</p>
            </div>
            <div class="header-actions">
                <button class="add-button" id="openAddModalBtn">
                    <span>+</span> Add Staff Member
                </button>
            </div>
        </header>

        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <span style="margin-left: 12px;">Loading staff...</span>
        </div>
        
        <div class="staff-grid" id="staffGrid" style="display: none;"></div>
    </main>

    <div id="staffModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Staff Member</h2>
                <button class="close-button" id="closeModalBtn">&times;</button>
            </div>
            
            <form id="staffForm">
                <input type="hidden" id="staff-id" name="id">
                <div class="form-group"><label class="form-label" for="name">Full Name</label><input type="text" class="form-input" id="name" name="name" required></div>
                <div class="form-group"><label class="form-label" for="email">Email Address</label><input type="email" class="form-input" id="email" name="email" required></div>
                <div class="form-group" id="passwordGroup">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" name="password">
                    <small style="color: #9ca3af; font-size: 12px; margin-top: 4px; display: block;">Required for new staff. Leave blank to keep current password when editing.</small>
                </div>
                <div class="form-group"><label class="form-label" for="phone">Phone Number</label><input type="tel" class="form-input" id="phone" name="phone" required></div>
                <div class="form-group">
                    <label class="form-label" for="role">Role</label>
                    <select class="form-select" id="role" name="role" required><option value="">Loading roles...</option></select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="society">Assigned Societies</label>
                    <select class="form-select" id="society" name="society" multiple required>
                        <option value="">Loading societies...</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" id="submitBtn">Add Staff Member</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State and DOM Elements
        let currentStaffList = [];
        const staffModal = document.getElementById('staffModal');
        const staffForm = document.getElementById('staffForm');
        const modalTitle = document.getElementById('modalTitle');
        const submitBtn = document.getElementById('submitBtn');
        const passwordGroup = document.getElementById('passwordGroup');
        const staffIdInput = document.getElementById('staff-id');

        // =================================================================
        //                 DYNAMIC DATA POPULATION
        // =================================================================
        const populateRolesDropdown = async () => {
            try {
                const response = await fetch('/api/roles');
                if (!response.ok) throw new Error('Failed to fetch roles');
                const roles = await response.json();
                const roleDropdown = document.getElementById('role');
                roleDropdown.innerHTML = '<option value="" disabled selected>-- Select a Role --</option>';
                roles.forEach(role => {
                    roleDropdown.innerHTML += `<option value="${role._id}">${role.role_name}</option>`;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('role').innerHTML = '<option value="">Error loading roles</option>';
            }
        };

        // ** NEW: Function to populate societies dropdown **
        const populateSocietiesDropdown = async () => {
            try {
                const response = await fetch('/api/societies');
                if (!response.ok) throw new Error('Failed to fetch societies');
                const societies = await response.json();
                const societyDropdown = document.getElementById('society');
                societyDropdown.innerHTML = ''; // Clear loading text
                societies.forEach(society => {
                    societyDropdown.innerHTML += `<option value="${society._id}">${society.name}</option>`;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('society').innerHTML = '<option value="">Error loading societies</option>';
            }
        };

        // =================================================================
        //                   CARD RENDERING
        // =================================================================
        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(' ');
            return (parts.length > 1 ? parts[0][0] + parts[parts.length - 1][0] : name[0]).toUpperCase();
        }

        function generateStaffId(mongoId) {
            return `STF-${mongoId.slice(-6).toUpperCase()}`;
        }
        
        function renderStaffCards(data = currentStaffList) {
            const staffGrid = document.getElementById('staffGrid');
            if (data.length === 0) {
                staffGrid.innerHTML = `<div class="empty-state"><h3>No staff found</h3><p>Add a new staff member to get started.</p></div>`;
                return;
            }
            staffGrid.innerHTML = data.map((staff) => {
                const roleName = staff.role ? staff.role.role_name : 'Unassigned';
                // ** UPDATED: Handle array of societies **
                const societyNames = (staff.society && staff.society.length > 0) 
                    ? staff.society.map(s => s.name).join(', ') 
                    : 'N/A';

                return `
                <div class="staff-card">
                    <div class="staff-header">
                        <div class="staff-info">
                            <div class="staff-avatar">${getInitials(staff.name)}</div>
                            <div><h3>${staff.name}</h3><div class="staff-id">${generateStaffId(staff._id)}</div></div>
                        </div>
                        <div class="staff-actions">
                            <button class="action-btn edit-btn" onclick="openModalForEdit('${staff._id}')" title="Edit">✏️</button>
                            <button class="action-btn delete-btn" onclick="deleteStaff('${staff._id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                    <div class="role-badge">${roleName}</div>
                    <div class="contact-info">
                        <div class="contact-item"><span class="contact-icon">📞</span> ${staff.phone || 'N/A'}</div>
                        <div class="contact-item"><span class="contact-icon">📧</span> ${staff.email}</div>
                        <div class="contact-item"><span class="contact-icon">📍</span> ${societyNames}</div>
                    </div>
                </div>`;
            }).join('');
        }
        
        // =================================================================
        //                 FETCH & DELETE OPERATIONS
        // =================================================================
        const fetchStaff = async () => {
            try {
                document.getElementById('loadingState').style.display = 'flex';
                document.getElementById('staffGrid').style.display = 'none';
                
                const response = await fetch('/api/staff');
                if (!response.ok) throw new Error(`Network Error: ${response.statusText}`);
                
                currentStaffList = await response.json();
                renderStaffCards();
            } catch (error) {
                console.error('Failed to fetch staff:', error);
                document.getElementById('loadingState').innerHTML = `<div class="empty-state"><h3>⚠️ Error</h3><p>Could not load staff data.</p></div>`;
            } finally {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('staffGrid').style.display = 'grid';
            }
        };

        window.deleteStaff = async (id) => {
            if (!confirm('Are you sure you want to delete this staff member?')) return;
            try {
                const response = await fetch(`/api/staff/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error((await response.json()).message);
                fetchStaff();
            } catch (error) {
                alert(`Error deleting staff: ${error.message}`);
            }
        };

        // =================================================================
        //                   MODAL HANDLING
        // =================================================================
        function openModalForAdd() {
            staffForm.reset();
            staffIdInput.value = '';
            modalTitle.textContent = 'Add New Staff Member';
            submitBtn.textContent = 'Add Staff Member';
            document.getElementById('password').required = true;
            staffModal.style.display = 'block';
        }

        window.openModalForEdit = (id) => {
            const staff = currentStaffList.find(s => s._id === id);
            if (!staff) return;
            
            staffForm.reset();
            modalTitle.textContent = 'Edit Staff Member';
            submitBtn.textContent = 'Save Changes';
            
            staffIdInput.value = staff._id;
            document.getElementById('name').value = staff.name;
            document.getElementById('email').value = staff.email;
            document.getElementById('phone').value = staff.phone || '';
            document.getElementById('role').value = staff.role ? staff.role._id : '';
            document.getElementById('password').required = false;

            // ** UPDATED: Pre-select multiple societies **
            const societyDropdown = document.getElementById('society');
            const selectedSocietyIds = staff.society ? staff.society.map(s => s._id) : [];
            Array.from(societyDropdown.options).forEach(option => {
                option.selected = selectedSocietyIds.includes(option.value);
            });
            
            staffModal.style.display = 'block';
        };

        function closeModal() {
            staffModal.style.display = 'none';
        }

        // =================================================================
        //                   FORM SUBMISSION
        // =================================================================
        staffForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            // ** UPDATED: Correctly handle form data for multi-select **
            const data = {};
            for (let [key, value] of formData.entries()) {
                if (key !== 'society') {
                    data[key] = value;
                }
            }
            data.society = formData.getAll('society'); // `getAll` is crucial for multi-select
            
            const id = data.id;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/staff/${id}` : '/api/staff';

            if (id && !data.password) {
                delete data.password;
            }

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error((await response.json()).message);
                
                closeModal();
                fetchStaff();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        });
        
        // =================================================================
        //                   EVENT LISTENERS & INITIALIZATION
        // =================================================================
        document.getElementById('openAddModalBtn').addEventListener('click', openModalForAdd);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => e.target === staffModal && closeModal());

        async function initializePage() {
            await Promise.all([
                populateRolesDropdown(),
                populateSocietiesDropdown()
            ]);
            await fetchStaff();
        }

        initializePage();
    </script>
</body>
</html>
